<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notifications — Ad'sHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; color: #111; background: #f9fafb; }
    a { text-decoration: none; color: inherit; }
    nav { display: flex; align-items: center; justify-content: space-between; padding: 14px 24px; border-bottom: 1px solid #f0f0f0; background: #fff; }
    .logo { font-size: 20px; font-weight: 600; }
    .logo span { color: #16a34a; }
    .back-bar { padding: 12px 24px; background: #fff; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; }
    .back-bar a { font-size: 14px; color: #666; }
    .mark-all { font-size: 13px; color: #16a34a; font-weight: 500; cursor: pointer; border: none; background: none; font-family: 'Inter', sans-serif; }
    .page { max-width: 640px; margin: 0 auto; padding: 24px; }
    .tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
    .tab { padding: 7px 18px; border-radius: 999px; font-size: 13px; cursor: pointer; border: 1px solid #e5e7eb; color: #666; background: #fff; font-family: 'Inter', sans-serif; display: flex; align-items: center; gap: 6px; }
    .tab.active { background: #16a34a; color: #fff; border-color: #16a34a; }
    .unread-count { background: #fff; color: #16a34a; font-size: 11px; font-weight: 600; padding: 1px 7px; border-radius: 999px; }
    .tab.active .unread-count { background: rgba(255,255,255,0.3); color: #fff; }
    .notif-card { background: #fff; border: 1px solid #f0f0f0; border-radius: 16px; overflow: hidden; margin-bottom: 4px; }
    .notif-row { display: flex; gap: 14px; padding: 16px; cursor: pointer; border-bottom: 1px solid #f9fafb; transition: background 0.15s; position: relative; }
    .notif-row:last-child { border-bottom: none; }
    .notif-row:hover { background: #f9fafb; }
    .notif-row.unread { background: #f0fdf4; }
    .notif-row.unread:hover { background: #dcfce7; }
    .notif-icon { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
    .notif-icon.unread { background: #dcfce7; }
    .notif-icon.read { background: #f3f4f6; }
    .notif-body { flex: 1; }
    .notif-title { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
    .notif-desc { font-size: 13px; color: #666; line-height: 1.5; margin-bottom: 5px; }
    .notif-time { font-size: 11px; color: #888; }
    .unread-dot { width: 8px; height: 8px; background: #16a34a; border-radius: 50%; position: absolute; top: 18px; right: 16px; }
    .empty { background: #fff; border: 1px solid #f0f0f0; border-radius: 16px; padding: 48px; text-align: center; }
    .empty-icon { font-size: 40px; margin-bottom: 12px; }
    .empty-title { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
    .empty-desc { font-size: 14px; color: #888; }
    .count-text { text-align: center; font-size: 13px; color: #888; margin-top: 14px; }
  </style>
</head>
<body>
  <nav>
    <div class="logo">Ad's<span>Hub</span></div>
    <div style="font-size:13px;color:#888;">Notifications</div>
  </nav>
  <div class="back-bar">
    <a href="dashboard.html">← Back to dashboard</a>
    <button class="mark-all" onclick="markAll()">Mark all as read</button>
  </div>
  <div class="page">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('all',this)">All <span class="unread-count" id="unreadBadge" style="display:none"></span></button>
      <button class="tab" onclick="switchTab('earnings',this)">Earnings</button>
      <button class="tab" onclick="switchTab('withdrawals',this)">Withdrawals</button>
      <button class="tab" onclick="switchTab('system',this)">System</button>
    </div>
    <div id="notifList"></div>
    <div class="count-text" id="countText"></div>
  </div>
  <script>
    const SUPABASE_URL = 'https://mggidzjjenmynlxugxit.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1nZ2lkempqZW5teW5seHVneGl0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MzcwNzEsImV4cCI6MjA5NzExMzA3MX0.YG6gDxk1F_8tT2tCNn0DfEPd0XJrGTxTUe6aJhz_rWw';
    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let allNotifs = [];
    let currentTab = 'all';
    let userId = null;

    function getIcon(type) {
      switch(type) { case 'earnings': return '🪙'; case 'withdrawals': return '💸'; default: return '🔔'; }
    }

    function renderNotifs(list) {
      const container = document.getElementById('notifList');
      if (list.length === 0) {
        container.innerHTML = `<div class="empty"><div class="empty-icon">🔕</div><div class="empty-title">No notifications yet</div><div class="empty-desc">Watch some ads to start earning and get notified!</div></div>`;
        document.getElementById('countText').textContent = '';
        return;
      }
      container.innerHTML = `<div class="notif-card">${list.map(n => `
        <div class="notif-row ${!n.read ? 'unread' : ''}" onclick="markRead('${n.id}', this)">
          ${!n.read ? '<div class="unread-dot"></div>' : ''}
          <div class="notif-icon ${!n.read ? 'unread' : 'read'}">${getIcon(n.type)}</div>
          <div class="notif-body">
            <div class="notif-title">${n.title}</div>
            <div class="notif-desc">${n.description}</div>
            <div class="notif-time">${new Date(n.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})}</div>
          </div>
        </div>`).join('')}</div>`;
      document.getElementById('countText').textContent = `${list.length} notification${list.length !== 1 ? 's' : ''}`;
    }

    function switchTab(tab, el) {
      currentTab = tab;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      const filtered = tab === 'all' ? allNotifs : allNotifs.filter(n => n.type === tab);
      renderNotifs(filtered);
    }

    async function markRead(id, row) {
      row.classList.remove('unread');
      const dot = row.querySelector('.unread-dot');
      const icon = row.querySelector('.notif-icon');
      if (dot) dot.remove();
      if (icon) { icon.classList.remove('unread'); icon.classList.add('read'); }
      allNotifs = allNotifs.map(n => n.id === id ? {...n, read: true} : n);
      updateUnreadBadge();
      await db.from('notifications').update({ read: true }).eq('id', id);
    }

    async function markAll() {
      document.querySelectorAll('.notif-row.unread').forEach(row => {
        row.classList.remove('unread');
        const dot = row.querySelector('.unread-dot');
        const icon = row.querySelector('.notif-icon');
        if (dot) dot.remove();
        if (icon) { icon.classList.remove('unread'); icon.classList.add('read'); }
      });
      allNotifs = allNotifs.map(n => ({...n, read: true}));
      updateUnreadBadge();
      await db.from('notifications').update({ read: true }).eq('user_id', userId);
    }

    function updateUnreadBadge() {
      const count = allNotifs.filter(n => !n.read).length;
      const badge = document.getElementById('unreadBadge');
      if (count > 0) { badge.textContent = count; badge.style.display = 'inline'; }
      else { badge.style.display = 'none'; }
    }

    async function loadPage() {
      const { data: { user } } = await db.auth.getUser();
      if (!user) { location.href = 'login.html'; return; }
      userId = user.id;
      const { data } = await db.from('notifications').select('*').eq('user_id', user.id).order('created_at', { ascending: false });
      allNotifs = data || [];
      updateUnreadBadge();
      renderNotifs(allNotifs);
    }
    loadPage();
  </script>
</body>
</html>
